services:
  vote:
    image: salujaji/vote
    build:
      context: ./vote
      dockerfile: Dockerfile  
    ports:
      - "5000:80"             
    depends_on:
      - redis
    networks:
      - vote

  redis:
    image: redis:6-alpine
    networks:
      - vote

  worker:                     
    image: salujaji/worker
    build:
      context: ./worker
      dockerfile: Dockerfile
    depends_on:
      - redis
      - db
    networks:
      - vote

  db:
    image: postgres:17-alpine
    networks:
      - vote
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust

  result:                      
    image: salujaji/result
    build:
      context: ./result
      dockerfile: Dockerfile
    ports:
      - "4000:80"              
    depends_on:
      - db
    networks:
      - vote

networks:                     
  vote:
    driver: bridge
